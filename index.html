<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#0f0f1a"/>
<title>Jothi Anantham Chits - Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0f0f1a,#1b1035,#2b0f40);
  min-height:100vh;
  color:white;
  overflow-x:hidden;
}

/* Glow Background */
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#8e2de2,transparent 70%);
  top:-150px;
  left:-150px;
  filter:blur(100px);
  opacity:0.5;
}

/* Container */
.container{
  padding:40px 20px;
  text-align:center;
}

/* Title */
.menu h1{
  font-size:32px;
  font-weight:700;
  background:linear-gradient(90deg,#c471f5,#fa71cd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:30px;
  letter-spacing:1px;
}

/* Button Grid */
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:900px;
  margin:auto;
}

/* Luxury Button */
.menu button{
  padding:18px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  color:white;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  transition:0.3s ease;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.menu button:hover{
  transform:translateY(-5px) scale(1.03);
  background:linear-gradient(90deg,#8e2de2,#ff416c);
  box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

/* Slideshow */
.content{
  margin-top:50px;
  display:flex;
  justify-content:center;
}

.slideshow{
  width:320px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
}

.slides{
  display:flex;
  width:300%;
  height:100%;
  animation:slide 20s infinite;
}

.slides img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes slide{
  0%{transform:translateX(0);}
  33%{transform:translateX(-100%);}
  66%{transform:translateX(-200%);}
  100%{transform:translateX(0);}
}

/* Install Bar */
#installBar{
  display:none;
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  padding:12px 20px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  gap:15px;
  align-items:center;
}

#installBar button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.primary{
  background:linear-gradient(90deg,#8e2de2,#ff416c);
  color:white;
}

/* Offline Notice */
#offlineNotice{
  display:none;
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  padding:8px 15px;
  border-radius:8px;
  font-size:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* Mobile */
@media(max-width:600px){
  .menu h1{font-size:24px;}
  .slideshow{width:260px;height:260px;}
}

</style>
</head>

<body>

<div id="offlineNotice">Offline Mode Active</div>

<div class="container">
  <div class="menu">
    <h1>Jothi Anantham Chits</h1>
    <button onclick="location.href='index.html.html'">Admin & Collection</button>
    <button onclick="location.href='Succuss.html'">Success Story</button>
    <button onclick="location.href='Login.html'">Transaction Entry</button>
    <button onclick="location.href='Aef Form.html'">AEF</button>
    <button onclick="location.href='Field Investigation Portal.html'">FI Portal</button>
    <button onclick="location.href='Attendance.html'">Staff Attendance</button>
  </div>

  <div class="content">
    <div class="slideshow">
      <div class="slides">
        <img src="https://sanastar0006.github.io/jothichitsapp/android-chrome-512x512.png">
        <img src="https://img.freepik.com/free-vector/savings-concept-illustration_114360-2146.jpg">
        <img src="https://img.freepik.com/free-vector/financial-data-concept-illustration_114360-1188.jpg">
      </div>
    </div>
  </div>
</div>

<script>
function updateNetworkStatus(){
  document.getElementById('offlineNotice').style.display =
  navigator.onLine ? 'none':'block';
}
window.addEventListener('online',updateNetworkStatus);
window.addEventListener('offline',updateNetworkStatus);
updateNetworkStatus();
</script>

</body>
</html>
