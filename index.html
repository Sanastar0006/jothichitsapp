<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#0f0f1a"/>
<title>Jothi Anantham Chits - Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  color:white;
  padding:40px;
}

h1{
  text-align:center;
  font-size:30px;
  margin-bottom:40px;
  letter-spacing:1px;
}

.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  max-width:1000px;
  margin:auto;
}

.menu button{
  padding:20px;
  border:none;
  border-radius:12px;
  font-weight:600;
  background:white;
  color:#203a43;
  box-shadow:0 8px 25px rgba(0,0,0,.3);
  transition:.3s;
  cursor:pointer;
}

.menu button:hover{
  transform:translateY(-5px);
  box-shadow:0 12px 35px rgba(0,0,0,.5);
  background:#2c5364;
  color:white;
}

</style>
</head>

<body>

<div id="offlineNotice">Offline Mode Active</div>

<div class="container">
  <div class="menu">
    <h1>Jothi Anantham Chits</h1>
    <button onclick="location.href='index.html.html'">Admin & Collection</button>
    <button onclick="location.href='Succuss.html'">Success Story</button>
    <button onclick="location.href='Login.html'">Transaction Entry</button>
    <button onclick="location.href='Aef Form.html'">AEF</button>
    <button onclick="location.href='Field Investigation Portal.html'">FI Portal</button>
    <button onclick="location.href='Attendance.html'">Staff Attendance</button>
  </div>

  <div class="content">
    <div class="slideshow">
      <div class="slides">
        <img src="https://sanastar0006.github.io/jothichitsapp/android-chrome-512x512.png">
        <img src="https://img.freepik.com/free-vector/savings-concept-illustration_114360-2146.jpg">
        <img src="https://img.freepik.com/free-vector/financial-data-concept-illustration_114360-1188.jpg">
      </div>
    </div>
  </div>
</div>

<script>
function updateNetworkStatus(){
  document.getElementById('offlineNotice').style.display =
  navigator.onLine ? 'none':'block';
}
window.addEventListener('online',updateNetworkStatus);
window.addEventListener('offline',updateNetworkStatus);
updateNetworkStatus();
</script>

</body>
</html>
